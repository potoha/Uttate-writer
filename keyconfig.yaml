# Uttate Writer key configuration
#
# This file is both configuration and a keyboard cheat sheet.
# You can edit keys here, but the Settings window is safer for combination keys.
# Key examples: Enter, Shift+Enter, Ctrl+Enter, Escape, Space, F2, F12, Up, Down.
#
version: 1
modes:

  global:
    open_settings:
      label: "Open settings"
      keys:
        - "F12"
      role: "Open the key configuration window in a separate window."
      note: "This is available from the main window and mirrors the Settings button."
    toggle_debug_console:
      label: "Toggle debug console"
      keys:
        - "Ctrl+D"
      role: "Show or hide the diagnostic console."
      note: "Normal writing keeps this hidden so the HUD stays small."
    toggle_input_review:
      label: "Toggle input/review"
      keys:
        - "F2"
      role: "Switch between Input mode and Review mode."
      note: "In Candidate edit mode this cancels the edit and returns to Review mode."

  input:
    clear_or_hide:
      label: "Clear or hide"
      keys:
        - "Escape"
      role: "Clear the input if it has text; otherwise close the transient UI."
    commit_chunk:
      label: "Commit chunk"
      keys:
        - "Enter"
      role: "Send the current rough input chunk to the conversion queue."
      note: "The editor clears immediately so you can keep writing while conversion runs."
    insert_chunk_separator:
      label: "Insert chunk separator"
      keys:
        - "Space"
      role: "Insert the Uttate rough-input separator ` | ` instead of IME conversion."
    insert_newline:
      label: "Insert newline"
      keys:
        - "Shift+Enter"
      role: "Insert a normal line break without committing the chunk."
    insert_space:
      label: "Insert real space"
      keys:
        - "Shift+Space"
      role: "Insert a normal half-width space."
    send_or_convert:
      label: "Send or convert"
      keys:
        - "Ctrl+Enter"
      role: "Send the current InputPanel text through the same action as the Send button."

  review:
    accept_candidate:
      label: "Accept candidate"
      keys:
        - "Enter"
      role: "Adopt the currently previewed candidate and copy it to the clipboard."
    accept_candidate_for_dataset:
      label: "Accept candidate for dataset"
      keys:
        - "Shift+Enter"
      role: "Adopt the currently previewed candidate, copy it, and add it to dataset candidates."
      note: "This only records data when dataset capture is enabled in Settings."
    cycle_candidate:
      label: "Cycle candidate"
      keys:
        - "Space"
      role: "Preview the other candidate, or move to the next chunk if no alternate exists."
      note: "The project spec may later move this to Tab; the UI can already change it."
    edit_as_input:
      label: "Edit as input"
      keys:
        - "E"
      role: "Copy the selected candidate into Input mode for rewriting."
    edit_candidate:
      label: "Edit candidate"
      keys:
        - "F"
      role: "Edit the selected candidate directly in Candidate edit mode."
    move_next_chunk:
      label: "Next chunk"
      keys:
        - "Down"
      role: "Move to the next actionable review chunk."
    move_previous_chunk:
      label: "Previous chunk"
      keys:
        - "Up"
      role: "Move to the previous actionable review chunk."
    reconvert_chunk:
      label: "Reconvert chunk"
      keys:
        - "R"
      role: "Send the selected chunk back through conversion."
    reject_chunk:
      label: "Reject chunk"
      keys:
        - "Backspace"
        - "Delete"
      role: "Reject the selected pending, edited, or failed chunk."
    return_to_input:
      label: "Return to input"
      keys:
        - "Escape"
      role: "Leave Review mode and return to writing."

  candidate_edit:
    accept_edit:
      label: "Accept edit"
      keys:
        - "Enter"
      role: "Adopt the edited candidate and copy it to the clipboard."
    cancel_edit:
      label: "Cancel edit"
      keys:
        - "Escape"
        - "F2"
      role: "Discard the temporary candidate edit and return to Review mode."
    insert_space:
      label: "Insert space"
      keys:
        - "Space"
      role: "Insert a normal space while editing a candidate."
    reconvert_edited_text:
      label: "Reconvert edited text"
      keys:
        - "Ctrl+Enter"
      role: "Use the edited text as raw input and send it through conversion again."
